project_name: external-dns-t-cloud-public-webhook

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: webhook
    main: ./cmd/webhook
    binary: external-dns-t-cloud-public-webhook
    env:
      - CGO_ENABLED=0
    flags:
      - -v
      - -a
    goos:
      - darwin
      - freebsd
      - linux
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - "5"
      - "6"
      - "7"
    ignore:
      - goos: darwin
        goarch: arm

dockers:
  - ids:
      - webhook
    image_templates:
      - "{{ .Env.IMAGE_REPOSITORY }}:{{ .Version }}-amd64"
    goos: linux
    goarch: amd64
    dockerfile: goreleaser.dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
  - ids:
      - webhook
    image_templates:
      - "{{ .Env.IMAGE_REPOSITORY }}:{{ .Version }}-arm64"
    goos: linux
    goarch: arm64
    dockerfile: goreleaser.dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "{{ .Env.IMAGE_REPOSITORY }}:{{ .Version }}"
    image_templates:
      - "{{ .Env.IMAGE_REPOSITORY }}:{{ .Version }}-amd64"
      - "{{ .Env.IMAGE_REPOSITORY }}:{{ .Version }}-arm64"

archives:
  - name_template: "{{ .ProjectName }}-{{ .Version }}.{{ .Os }}-{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    formats:
      - tar.gz
    wrap_in_directory: true

checksum:
  name_template: "{{ .ProjectName }}-{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  footer: |
    ## Docker Images
    - {{ .Env.IMAGE_REPOSITORY }}:{{ .Version }}
    - {{ .Env.IMAGE_REPOSITORY }}:{{ .Version }}-amd64
    - {{ .Env.IMAGE_REPOSITORY }}:{{ .Version }}-arm64
  prerelease: auto
  replace_existing_draft: true
